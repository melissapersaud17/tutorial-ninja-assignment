plugins {
    id 'java'
}

group = 'com.tutorialninja'
version = '1.0-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Selenium — drives the browser
    testImplementation 'org.seleniumhq.selenium:selenium-java:4.27.0'

    // WebDriverManager — auto-downloads and manages the correct ChromeDriver for you
    testImplementation 'io.github.bonigarcia:webdrivermanager:5.9.2'

    // Cucumber — the BDD test framework
    testImplementation 'io.cucumber:cucumber-java:7.20.1'
    testImplementation 'io.cucumber:cucumber-junit-platform-engine:7.20.1'

    // JUnit 5 Platform — needed to run Cucumber tests
    testImplementation 'org.junit.platform:junit-platform-suite:1.11.3'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.3'
}

test {
    useJUnitPlatform()
    systemProperty "cucumber.plugin", "pretty, html:build/reports/cucumber.html"
}